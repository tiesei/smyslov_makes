<script>



// ── SHARED API UTILS ─────────────────────────────────────────────────────────
 // 10 min

function cacheSet(key, data) {
  try { localStorage.setItem(key, JSON.stringify({ data })); } catch(e) {}
}
function cacheGet(key) {
  try {
    const raw = localStorage.getItem(key);
    if (!raw) return null;
    const { data } = JSON.parse(raw);
    return data;
  } catch(e) { return null; }
}
function cacheInvalidate(key) { try { localStorage.removeItem(key); } catch(e) {} }

async function apiFetch(url, options, retries = 3) {
  for (let i = 0; i < retries; i++) {
    try {
      const res = await fetch(url, options);
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      return res;
    } catch(e) {
      if (i < retries - 1) await new Promise(r => setTimeout(r, 2000));
      else throw e;
    }
  }
}

// Keep-alive ping every 8 min
setInterval(() => {
  fetch("https://materials-parser-api.onrender.com/health").catch(() => {});
}, 8 * 60 * 1000);

const API = "https://materials-parser-api.onrender.com";
const AUTO_SAVE_KEY = "calc_autosave";
let products = [], headers = [], materials = [], isAdmin = false;
let featuresData = { headers: [], features: [] };
let autosaveTimer = null;
let activeEditTemplate = null;

// ── INIT ──────────────────────────────────────────────────────────────────────
function loadFromCache() {
  const cp = cacheGet("products");
  if (cp) { headers = cp.headers || []; products = cp.products || []; populateProductSelect(); }
  const cm = cacheGet("materials");
  if (cm) {
    materials = cm;
    materials.forEach(m => {
      if (typeof m.colors === "string") { try { m.colors = JSON.parse(m.colors); } catch { m.colors = []; } }
      if (typeof m.variants === "string") { try { m.variants = JSON.parse(m.variants); } catch { m.variants = []; } }
    });
  }
  const cf = cacheGet("features");
  if (cf) featuresData = { headers: cf.headers || [], features: cf.features || [] };
  return !!(cp && cm);
}

async function init() {
  const hasCached = loadFromCache();
  const raw = localStorage.getItem(AUTO_SAVE_KEY);
  if (hasCached && raw) { try { restoreFromState(JSON.parse(raw)); } catch(e) {} }
  // Templates always fresh (change often), rest only if no cache
  await loadTemplates();
  if (!hasCached) await Promise.all([loadProducts(), loadMaterials(), loadFeaturesData()]);
}

async function loadProducts() {
  const cached = cacheGet("products");
  if (cached) { headers = cached.headers || []; products = cached.products || []; populateProductSelect(); }
  try {
    const res = await apiFetch(`${API}/products`);
    const data = await res.json();
    headers = data.headers || []; products = data.products || [];
    cacheSet("products", data);
    populateProductSelect();
  } catch(e) { console.error("loadProducts failed", e); }
}

async function loadMaterials() {
  const cached = cacheGet("materials");
  if (cached) {
    materials = cached;
    materials.forEach(m => {
      if (typeof m.colors === "string") { try { m.colors = JSON.parse(m.colors); } catch { m.colors = []; } }
      if (typeof m.variants === "string") { try { m.variants = JSON.parse(m.variants); } catch { m.variants = []; } }
    });
    return;
  }
  try {
    const res = await apiFetch(`${API}/materials`);
    materials = await res.json();
    cacheSet("materials", materials);
    materials.forEach(m => {
      if (typeof m.colors === "string") { try { m.colors = JSON.parse(m.colors); } catch { m.colors = []; } }
      if (typeof m.variants === "string") { try { m.variants = JSON.parse(m.variants); } catch { m.variants = []; } }
    });
  } catch(e) { console.error("loadMaterials failed", e); }
}

async function loadFeaturesData() {
  const cached = cacheGet("features");
  if (cached) { featuresData = { headers: cached.headers || [], features: cached.features || [] }; return; }
  try {
    const res = await apiFetch(`${API}/features`);
    const data = await res.json();
    featuresData = { headers: data.headers || [], features: data.features || [] };
    cacheSet("features", data);
  } catch(e) { console.warn("loadFeaturesData failed", e); }
}

function populateProductSelect() {
  const sel = document.getElementById("productSelect");
  sel.innerHTML = '<option value="">— select product —</option>';
  products.forEach((p, i) => {

// ── TYPE MAPPING ──────────────────────────────────────────────────────────────
function getTypeFromHeader(h) {
  const first = h.split(/[\s:]/)[0].toLowerCase();
  const map = { fabric:"Fabric", foam:"Foam", webbing:"Webbing", zipper:"Zipper", furniture:"Furniture", binding:"Binding" };
  return map[first] || null;
}

function filterMaterialsByHeader(h) {
  const type = getTypeFromHeader(h);
  return type ? materials.filter(m => m.type === type) : materials;
}

// ── PRODUCT CHANGE ────────────────────────────────────────────────────────────
function onProductChange() {
  const idx = parseInt(document.getElementById("productSelect").value);
  if (isNaN(idx)) {
    document.getElementById("positions").innerHTML = '<div class="empty-state">Select a product above to start</div>';
    document.getElementById("summary").style.display = "none";
    document.getElementById("featuresSection").style.display = "none";
    return;
  }
  renderPositions(products[idx]);
  document.getElementById("featuresSection").style.display = "";
  document.getElementById("featuresAdded").innerHTML = "";
  document.getElementById("summary").style.display = "block";
  buildFeatOptions("");
  onAnyChange();
}

// ── AUTOSAVE ──────────────────────────────────────────────────────────────────
function onAnyChange() {
  recalc();
  clearTimeout(autosaveTimer);
  autosaveTimer = setTimeout(() => {
    autoSave();
  }, 1000);
}

function autoSave() {
  const state = collectState();
  localStorage.setItem(AUTO_SAVE_KEY, JSON.stringify(state));
  const dot = document.getElementById("autosaveDot");
  dot.classList.add("saved");
  setTimeout(() => dot.classList.remove("saved"), 1500);
}

function collectState() {
  const state = {
    qty: document.getElementById("qty").value,
    productIdx: document.getElementById("productSelect").value,
    productName: "",
    rate: document.getElementById("hourlyRate").value,
    positions: []
  };
  const pidx = parseInt(state.productIdx);
  if (!isNaN(pidx) && products[pidx]) {
    state.productName = products[pidx][headers[0]] || "";
  }
  document.querySelectorAll(".position-card").forEach(card => {
    const matInput = card.querySelector(".mat-search-input");
    const colorSel = card.querySelector(".color-select");
    const optSel = card.querySelector(".opt-select");
    const mi = parseInt(matInput?.dataset.selectedIdx);
    const mat = isNaN(mi) ? null : materials[mi];
    state.positions.push({
      header: card.dataset.header,
      matUrl: mat?.url || "",
      matTitle: matInput?.value || "",
      colorIdx: colorSel?.value || "",
      optVal: optSel?.value || ""
    });
  });
  return state;
}

function restoreFromState(state) {
  if (!state) return;
  if (state.rate) document.getElementById("hourlyRate").value = state.rate;
  if (state.qty) document.getElementById("qty").value = state.qty;
  if (state.productIdx !== undefined && state.productIdx !== "") {
    const sel = document.getElementById("productSelect");
    // Find product by name first, fall back to index
    let idx = -1;
    if (state.productName) {
      idx = products.findIndex(p => p[headers[0]] === state.productName);
    }
    if (idx === -1) idx = parseInt(state.productIdx);
    if (!isNaN(idx) && products[idx]) {
      sel.value = idx;
      renderPositions(products[idx]);
      document.getElementById("summary").style.display = "block";
    }
    setTimeout(() => {
      document.querySelectorAll(".position-card").forEach(card => {
        const saved = state.positions?.find(p => p.header === card.dataset.header);
        if (!saved || !saved.matUrl) return;
        const mat = materials.find(m => m.url === saved.matUrl);
        if (!mat) return;
        const mi = materials.indexOf(mat);
        const matInput = card.querySelector(".mat-search-input");
        const colorSel = card.querySelector(".color-select");
        const optSel = card.querySelector(".opt-select");
        const img = card.querySelector("img");
        const priceEl = card.querySelector(".position-price");
        matInput.dataset.selectedIdx = mi;
        matInput.value = saved.matTitle || mat.title || "";
        onMatSelected(mi, img, colorSel, optSel, priceEl, parseFloat(card.dataset.qty));
        if (saved.colorIdx !== "" && colorSel) {
          colorSel.value = saved.colorIdx;
          const c = (mat.colors || [])[parseInt(saved.colorIdx)];
          if (c?.image && img) img.src = c.image;
          updateColorSelectStyle(colorSel, mat);
        }
        if (saved.optVal && optSel) optSel.value = saved.optVal;
      });
      recalc();
    }, 100);
  }
}

function onMatSelected(mi, img, colorSel, optSel, priceEl, posQty) {
  const mat = isNaN(mi) ? null : materials[mi];
  colorSel.innerHTML = '<option value="">— color —</option>';
  colorSel.style.display = "none";
  optSel.innerHTML = '<option value="">— option —</option>';
  optSel.style.display = "none";
  img.classList.remove("loaded"); img.src = "";
  priceEl.textContent = "—"; priceEl.className = "position-price na";
  if (!mat) return;

  const colors = mat.colors || [];
  if (colors.length > 0) {
    colors.forEach((c, ci) => {
      const o = document.createElement("option");
      o.value = ci;
      const inStock = !c.availability || c.availability === "In stock";
      o.textContent = (c.name || `Color ${ci+1}`) + (inStock ? "" : " (out of stock)");
      if (!inStock) { o.style.color = "#c0392b"; o.dataset.out = "1"; }
      colorSel.appendChild(o);
    });
    colorSel.style.opacity = "1"; colorSel.style.pointerEvents = "";
    colorSel.value = 0;
    if (colors[0]?.image) img.src = colors[0].image;
    updateColorSelectStyle(colorSel, mat);
  }

  const variants = mat.variants || [];
  if (variants.length > 0 && variants[0].options?.length > 0) {
    variants[0].options.forEach(o => {
      const opt = document.createElement("option");
      opt.value = o; opt.textContent = o; optSel.appendChild(opt);
    });
    optSel.style.opacity = "1"; optSel.style.pointerEvents = "";
  }
}

// ── RECALC ────────────────────────────────────────────────────────────────────
function recalc() {
  const qty = parseInt(document.getElementById("qty").value) || 1;
  const rate = parseFloat(document.getElementById("hourlyRate").value) || 0;
  const idx = parseInt(document.getElementById("productSelect").value);
  const product = isNaN(idx) ? null : products[idx];
  const hoursHeader = headers.find(h => h.toLowerCase().includes("working") || h.toLowerCase().includes("hours")) || headers[headers.length - 1];
  const hours = product ? parseFloat((product[hoursHeader] || "0").replace(",", ".")) : 0;

  let matTotal = 0;
  document.querySelectorAll(".position-card").forEach(card => {
    const posQty = parseFloat(card.dataset.qty || "0");
    const matInput = card.querySelector(".mat-search-input");
    const colorSel = card.querySelector(".color-select");
    const mi = parseInt(matInput?.dataset.selectedIdx);
    const mat = isNaN(mi) ? null : materials[mi];
    const priceEl = card.querySelector(".position-price");
    let price = 0;
    if (mat) {
      const ci = parseInt(colorSel?.value);
      const color = !isNaN(ci) ? (mat.colors || [])[ci] : null;
      price = color?.price_per_unit || parsePrice(mat.price || "");
    }
    const lineTotal = price * posQty * qty;
    matTotal += lineTotal;
    if (priceEl) {
      priceEl.textContent = mat && price ? `${lineTotal.toFixed(2)} EUR` : "—";
      priceEl.className = "position-price" + (mat && price ? "" : " na");
    }
  });

  // Feature material costs
  let featMatTotal = 0;
  let featLabourTotal = 0;
  const hoursHeaderFeat = featuresData.headers.find(h => h.toLowerCase().includes("working") || h.toLowerCase().includes("hours"));
  document.querySelectorAll(".feature-card").forEach(card => {
    card.querySelectorAll(".position-card").forEach(posCard => {
      const posQty = parseFloat(posCard.dataset.qty || "0");
      const matInput = posCard.querySelector(".mat-search-input");
      const colorSel = posCard.querySelector(".color-select");
      const mi = parseInt(matInput?.dataset.selectedIdx);
      const mat = isNaN(mi) ? null : materials[mi];
      const priceEl = posCard.querySelector(".position-price");
      let price = 0;
      if (mat) {
        const ci = parseInt(colorSel?.value);
        const color = !isNaN(ci) ? (mat.colors || [])[ci] : null;
        price = color?.price_per_unit || parsePrice(mat.price || "");
      }
      const lineTotal = price * posQty * qty;
      featMatTotal += lineTotal;
      if (priceEl) {
        priceEl.textContent = mat && price ? `${lineTotal.toFixed(2)} EUR` : "—";
        priceEl.className = "position-price" + (mat && price ? "" : " na");
      }
    });
    // Feature labour
    const featName = card.dataset.featname;
    const feat = featuresData.features.find(f => f[featuresData.headers[0]] === featName);
    if (feat && hoursHeaderFeat) {
      const fHours = parseFloat((feat[hoursHeaderFeat] || "0").replace(",", ".")) || 0;
      featLabourTotal += fHours * rate * qty;
    }
  });

  const labourTotal = hours * rate * qty + featLabourTotal;
  const costTotal = matTotal + featMatTotal + labourTotal;
  const markupPct = parseFloat(document.getElementById("markupPct")?.value || "0");
  const markupAmt = costTotal * (markupPct / 100);

  document.getElementById("sumMaterials").textContent = `${(matTotal + featMatTotal).toFixed(2)} EUR`;
  document.getElementById("sumLabour").textContent = `${labourTotal.toFixed(2)} EUR`;
  if (isAdmin) {
    document.getElementById("sumCost").textContent = `${costTotal.toFixed(2)} EUR`;
    document.getElementById("sumMarkup").textContent = `${markupAmt.toFixed(2)} EUR (+${markupPct}%)`;
    document.getElementById("sumTotal").textContent = `${(costTotal + markupAmt).toFixed(2)} EUR`;
  } else {
    document.getElementById("sumTotal").textContent = `${costTotal.toFixed(2)} EUR`;
  }
}

function parsePrice(str) {
  if (!str) return 0;
  const m = str.replace(",", ".").match(/[\d.]+/);
  return m ? parseFloat(m[0]) : 0;
}

      if (matList.classList.contains("open")) {
        searchInput.value = ""; buildOptions("");
        setTimeout(() => searchInput.focus(), 50);
      }
    };
    searchInput.oninput = () => buildOptions(searchInput.value);
    searchInput.onclick = e => e.stopPropagation();
    document.addEventListener("click", e => { if (!matWrap.contains(e.target)) matList.classList.remove("open"); });
    colorSel.onchange = () => {
      const mi = parseInt(matInput.dataset.selectedIdx);
      const mat = isNaN(mi) ? null : materials[mi];
      if (!mat) return;
      const c = (mat.colors || [])[parseInt(colorSel.value)];
      if (c?.image) img.src = c.image;
      updateColorSelectStyle(colorSel, mat);
      onAnyChange();
    };
    optSel.onchange = onAnyChange;

    matWrap.appendChild(matInput); matWrap.appendChild(matList);
    selects.appendChild(matWrap); selects.appendChild(colorSel); selects.appendChild(optSel);
    cardBottom.appendChild(thumbWrap); cardBottom.appendChild(selects);

    posCard.appendChild(cardTop); posCard.appendChild(priceEl); posCard.appendChild(cardBottom);
    bottom.appendChild(posCard);
  });

  card.appendChild(top); card.appendChild(removeBtn); card.appendChild(bottom);
  document.getElementById("featuresAdded").appendChild(card);
}

// ── OUT OF STOCK ──────────────────────────────────────────────────────────────
function updateColorSelectStyle(colorSel, mat) {
  const ci = parseInt(colorSel.value);
  const color = !isNaN(ci) ? (mat?.colors || [])[ci] : null;
  const inStock = !color || !color.availability || color.availability === "In stock";
  colorSel.classList.toggle("out-of-stock", !inStock);
}

// ── TEMPLATES ─────────────────────────────────────────────────────────────────
async function loadTemplates() {
  const cached = cacheGet("templates");
  if (cached) renderTemplates(cached);
  try {
    const res = await apiFetch(`${API}/templates`);
    if (!res.ok) return;
    const templates = await res.json();
    cacheSet("templates", templates);
    renderTemplates(templates);
  } catch(e) { console.warn("loadTemplates failed", e); }
}

function renderTemplates(templates) {
  const sidebar = document.getElementById("templatesSidebar");
  const empty = document.getElementById("templatesEmpty");
  sidebar.querySelectorAll(".template-card").forEach(el => el.remove());

  if (!templates || templates.length === 0) {
    empty.style.display = "";
    return;
  }
  empty.style.display = "none";

  templates.forEach(t => {
    const card = document.createElement("div");
    card.className = "template-card";

    // Editable name
    const nameEl = document.createElement("div");
    nameEl.className = "template-name";
    nameEl.textContent = t.name;
    nameEl.contentEditable = "true";
    nameEl.spellcheck = false;
    nameEl.onclick = (e) => e.stopPropagation();
    nameEl.onblur = async () => {
      const newName = nameEl.textContent.trim();
      if (!newName || newName === t.name) { nameEl.textContent = t.name; return; }
      // Rename: delete old, save new
      try {
        await fetch(`${API}/templates/${encodeURIComponent(t.name)}`, { method: "DELETE" });
        const state = collectState();
        state.productName = newName;
        await fetch(`${API}/templates`, {
          method: "POST", headers: {"Content-Type":"application/json"},
          body: JSON.stringify({...state, productName: newName})
        });
        if (activeEditTemplate === t.name) activeEditTemplate = newName;
        t.name = newName;
      } catch(e) { nameEl.textContent = t.name; }
    };
    nameEl.onkeydown = (e) => { if (e.key === "Enter") { e.preventDefault(); nameEl.blur(); } };

    const meta = document.createElement("div");
    meta.className = "template-meta";
    meta.textContent = ``;

    const del = document.createElement("button");
    del.className = "template-delete";
    del.textContent = "×";
    del.title = "Delete template";
    del.onclick = async (e) => {
      e.stopPropagation();
      if (activeEditTemplate === t.name) activeEditTemplate = null;
      await deleteTemplate(t.name);
    };

    // Two permanent icon buttons: edit (load) + save
    const actions = document.createElement("div");
    actions.className = "template-actions";

    const ICON_EDIT = `<svg viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>`;
    const ICON_SAVE = `<svg viewBox="0 0 24 24"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>`;

    const editBtn = document.createElement("button");
    editBtn.className = "tmpl-icon-btn" + (activeEditTemplate === t.name ? " is-active" : "");
    editBtn.innerHTML = ICON_EDIT;
    editBtn.title = "Load & edit";
    editBtn.onclick = async (e) => {
      e.stopPropagation();
      activeEditTemplate = t.name;
      loadTemplate(t);
      cacheInvalidate("templates"); await loadTemplates();
    };

    const saveBtn = document.createElement("button");
    saveBtn.className = "tmpl-icon-btn";
    saveBtn.innerHTML = ICON_SAVE;
    saveBtn.title = "Save current state to this template";
    saveBtn.onclick = async (e) => {
      e.stopPropagation();
      saveBtn.innerHTML = `<svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>`;
      const state = collectState();
      state.productName = t.name;
      try {
        await fetch(`${API}/templates`, {
          method: "POST", headers: {"Content-Type":"application/json"},
          body: JSON.stringify(state)
        });
      } catch(err) { console.error("save failed", err); }
      activeEditTemplate = null;
      cacheInvalidate("templates"); await loadTemplates();
    };

    actions.appendChild(editBtn);
    actions.appendChild(saveBtn);

    card.appendChild(nameEl);
    card.appendChild(meta);
    card.appendChild(del);
    card.appendChild(actions);
    card.onclick = () => loadTemplate(t);
    sidebar.appendChild(card);
  });

  // Sync mobile horizontal strip
  const mobileStrip = document.getElementById("mobileTemplatesStrip");
  mobileStrip.innerHTML = "";
  templates.forEach(t => {
    const card = document.createElement("div");
    card.className = "template-card";
    const nameEl = document.createElement("div");
    nameEl.className = "template-name";
    nameEl.textContent = t.name;
    card.appendChild(nameEl);
    card.onclick = () => loadTemplate(t);
    mobileStrip.appendChild(card);
  });
}

async function saveTemplate() {
  const state = collectState();
  if (!state.productName) { alert("Select a product first"); return; }
  try {
    const res = await fetch(`${API}/templates`, {
      method: "POST", headers: {"Content-Type":"application/json"},
      body: JSON.stringify(state)
    });
    if (!res.ok) throw new Error("Save failed");
    cacheInvalidate("templates"); await loadTemplates();
  } catch(e) { console.error("saveTemplate failed", e); }
}

async function deleteTemplate(name) {
  try {
    await fetch(`${API}/templates/${encodeURIComponent(name)}`, { method: "DELETE" });
    cacheInvalidate("templates"); await loadTemplates();
  } catch(e) { console.error("deleteTemplate failed", e); }
}

function loadTemplate(t) {
  try {
    const state = typeof t.state === "string" ? JSON.parse(t.state) : (t.state || t);
    restoreFromState(state);
    const label = document.getElementById("draftLabel");
    const name = document.getElementById("draftName");
    if (label && name) { name.textContent = t.name; label.style.display = ""; }
  } catch(e) { console.warn("loadTemplate failed", e); }
}

// ── RESET ─────────────────────────────────────────────────────────────────────
function resetCalc() {
  localStorage.removeItem(AUTO_SAVE_KEY);
  document.getElementById("qty").value = 1;
  document.getElementById("hourlyRate").value = 20;
  document.getElementById("productSelect").value = "";
  document.getElementById("positions").innerHTML = '<div class="empty-state">Select a product above to start</div>';
  document.getElementById("summary").style.display = "none";
  const dl = document.getElementById("draftLabel");
  if (dl) dl.style.display = "none";
  document.getElementById("featuresSection").style.display = "none";
  document.getElementById("featuresAdded").innerHTML = "";
}

// ── LOGIN ─────────────────────────────────────────────────────────────────────
function handleLogin() {
  isAdmin = !isAdmin;
  document.body.classList.toggle("is-admin", isAdmin);
  document.getElementById("loginBtn").textContent = isAdmin ? "sign out" : "sign in";
  recalc();
}

// ── START ─────────────────────────────────────────────────────────────────────
init();
</script>
