<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap');

  :root {
    --bg: #f0ede8;
    --surface: #faf9f7;
    --border: #ddd9d3;
    --text: #1a1a18;
    --text-muted: #888880;
    --accent: #2d5a3d;
    --mono: 'DM Mono', monospace;
    --sans: 'DM Sans', sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { max-width: 100%; overflow-x: hidden; }
  body { font-family: var(--sans); background: var(--bg); color: var(--text); min-height: 100vh; }

  nav {
    display: flex; justify-content: center;
    position: sticky; top: 0; z-index: 9999;
    background: transparent; padding: 0;
  }
  .nav-inner {
    width: 1000px; flex-shrink: 0;
    display: flex; align-items: center; gap: 0.5rem; padding: 0 1.25rem;
    background: var(--surface); border-bottom: 1px solid var(--border);
    height: 60px;
  }
  .nav-brand {
    display: flex; flex-direction: column; align-items: flex-start;
    text-decoration: none; gap: 0; line-height: 1; flex-shrink: 0; padding: 2px 0;
  }
  .nav-brand img { width: 50px; height: auto; display: block; }
  .nav-brand-sub {
    font-family: var(--mono); font-size: 11px; font-weight: 500;
    color: var(--text-muted); letter-spacing: 0.08em;
    text-transform: lowercase; line-height: 1; margin-top: 2px;
    width: 50px; text-align: center;
  }
  .nav-links { display: flex; }
  .nav-links a { font-size: 13px; color: var(--text-muted); text-decoration: none; padding: 0 0.6rem; height: 60px; display: flex; align-items: center; border-bottom: 2px solid transparent; transition: color 0.15s, border-color 0.15s; white-space: nowrap; }
  .nav-links a:hover { color: var(--text); }
  .nav-links a.active { color: var(--text); border-bottom-color: var(--accent); }
  .nav-end { margin-left: auto; flex-shrink: 0; }
  .sign-in-btn { font-size: 11px; padding: 3px 8px; background: none; border: 1px solid var(--border); border-radius: 5px; cursor: pointer; color: var(--text-muted); font-family: var(--sans); }

  .btn-ghost { font-size: 12px; padding: 3px 10px; background: none; border: 1px solid var(--border); border-radius: 5px; cursor: pointer; color: var(--text-muted); font-family: var(--sans); }

  .toolbar { display: flex; align-items: center; gap: 0.5rem; padding: 0.6rem 1rem; }
  .page-title { font-size: 12px; color: var(--text-muted); font-family: var(--mono); margin-right: auto; }

  .btn { font-family: var(--sans); font-size: 12px; font-weight: 500; padding: 4px 10px; border-radius: 5px; border: 1px solid var(--border); cursor: pointer; background: var(--surface); color: var(--text-muted); transition: all 0.15s; white-space: nowrap; }
  .btn:hover { background: var(--bg); color: var(--text); }
  .btn-primary { background: var(--accent); color: #fff; border-color: var(--accent); }
  .btn-primary:hover { opacity: 0.88; color: #fff; background: var(--accent); }

  .status-bar { font-family: var(--mono); font-size: 11px; color: var(--text-muted); padding: 0 1rem 0.35rem; display: flex; align-items: center; gap: 0.4rem; min-height: 18px; }
  .status-bar.loading { color: var(--accent); }
  .status-bar.error { color: #8b3a2a; }
  .status-bar.ok { color: var(--accent); }
  .spinner { width: 10px; height: 10px; border: 1.5px solid currentColor; border-top-color: transparent; border-radius: 50%; animation: spin 0.7s linear infinite; display: inline-block; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .table-wrap {
    background: var(--surface);
    border-top: 1px solid var(--border);
    border-bottom: 1px solid var(--border);
    overflow-x: auto;
    overflow-y: visible;
    -webkit-overflow-scrolling: touch;
    width: 100%;
  }


  table { width: auto; min-width: 0; border-collapse: collapse; table-layout: fixed; }
  thead { background: var(--bg); }
  thead tr { position: relative; }

  th {
    font-family: var(--mono);
    font-size: 10px;
    font-weight: 500;
    color: var(--text-muted);
    letter-spacing: 0.05em;
    text-transform: uppercase;
    border-bottom: 1px solid var(--border);
    white-space: nowrap;
    position: relative;
    width: 90px;
    padding: 0;
    vertical-align: bottom;
  }
  th:first-child { width: 140px; }
  th.th-add { width: 28px; }
  th.th-del { width: 28px; position: sticky; right: 0; background: var(--surface); z-index: 1; }
  td.td-del { position: sticky; right: 0; background: var(--surface); }

  .th-inner {
    padding: 4px 8px;
    display: flex; align-items: center; justify-content: flex-end; gap: 4px;
  }
  th:first-child .th-inner { justify-content: flex-start; }

  .th-name { outline: none; cursor: text; white-space: nowrap; }
  .th-name:focus { color: var(--text); }

  .col-btn { font-size: 9px; background: none; border: none; cursor: pointer; color: transparent; padding: 1px 2px; border-radius: 2px; line-height: 1; transition: color 0.1s, background 0.1s; flex-shrink: 0; }
  th:hover .col-btn { color: var(--text-muted); }
  .col-btn:hover { color: var(--text) !important; background: var(--border); }
  .col-btn.del:hover { color: #8b3a2a !important; }
  .col-move-wrap { display: flex; gap: 1px; flex-shrink: 0; }

  .th-add-btn { width: 100%; background: none; border: none; cursor: pointer; color: var(--text-muted); font-size: 15px; padding: 4px 6px; display: flex; align-items: center; justify-content: center; transition: color 0.15s; }
  .th-add-btn:hover { color: var(--accent); }

  /* Zebra rows extend full width via tr background */
  tbody tr:nth-child(odd):not(.add-row-tr) { background: var(--surface); }
  tbody tr:nth-child(even):not(.add-row-tr) { background: #f4f1ec; }
  tbody tr:not(.add-row-tr):hover { background: #ede9e2; }
  tr.add-row-tr { background: transparent; }

  td { padding: 2px 8px; border-bottom: none; vertical-align: middle; font-size: 13px; outline: none; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; line-height: 1.7; background: transparent; }
  td:focus { background: #fff !important; box-shadow: inset 0 0 0 1px var(--accent); border-radius: 2px; white-space: normal; overflow: visible; }

  td.name-cell { font-weight: 500; white-space: nowrap; text-align: left; }
  td.num-cell { font-family: var(--mono); font-size: 12px; text-align: right; }
  td.zero { font-family: var(--mono); font-size: 12px; text-align: right; color: var(--text-muted); }

  .del-row-btn { background: none; border: none; cursor: pointer; color: var(--text-muted); font-size: 12px; padding: 2px 4px; opacity: 0; transition: opacity 0.15s, color 0.15s; border-radius: 3px; }
  tr:hover .del-row-btn { opacity: 1; }
  .del-row-btn:hover { color: #8b3a2a; }

  .add-row-btn { background: none; border: none; cursor: pointer; color: var(--text-muted); font-size: 12px; font-family: var(--sans); padding: 6px 0; display: flex; align-items: center; gap: 4px; transition: color 0.15s; }
  .add-row-btn:hover { color: var(--accent); }

</style>

<script>
let headers = [];
let featHeaders = [];
let saveTimer = null;
let featSaveTimer = null;

function setStatus(msg, type = "") {
  const b = document.getElementById("statusBar");
  b.className = "status-bar" + (type ? " " + type : "");
  b.innerHTML = type === "loading" ? `<span class="spinner"></span> ${msg}` : msg;
}
function clearStatus(d = 0) { setTimeout(() => { const b = document.getElementById("statusBar"); b.innerHTML = ""; b.className = "status-bar"; }, d); }
function setFeatStatus(msg, type = "") {
  const b = document.getElementById("featStatusBar");
  b.className = "status-bar" + (type ? " " + type : "");
  b.innerHTML = type === "loading" ? `<span class="spinner"></span> ${msg}` : msg;
}
function clearFeatStatus(d = 0) { setTimeout(() => { const b = document.getElementById("featStatusBar"); b.innerHTML = ""; b.className = "status-bar"; }, d); }

async function loadProducts() {
  const cached = cacheGet("products");
  if (cached) { headers = cached.headers.length ? cached.headers : ["Product Name"]; render(headers, cached.products || []); }
  else setStatus("Loadingâ€¦", "loading");
  try {
    const res = await apiFetch(`${API}/products`);
    const data = await res.json();
    headers = data.headers.length ? data.headers : ["Product Name"];
    cacheSet("products", data);
    render(headers, data.products || []);
    clearStatus();
  } catch(e) {
    if (!cached) setStatus("Failed to load â€” API may be waking up, try again in 30s.", "error");
  }
}

async function loadFeatures() {
  const cached = cacheGet("features");
  if (cached) { featHeaders = cached.headers && cached.headers.length ? cached.headers : ["Feature Name"]; renderFeatures(featHeaders, cached.features || []); }
  else setFeatStatus("Loadingâ€¦", "loading");
  try {
    const res = await apiFetch(`${API}/features`);
    const data = await res.json();
    featHeaders = data.headers && data.headers.length ? data.headers : ["Feature Name"];
    cacheSet("features", data);
    renderFeatures(featHeaders, data.features || []);
    clearFeatStatus();
  } catch(e) {
    if (!cached) setFeatStatus("Failed to load features.", "error");
  }
}

function render(hdrs, products) { headers = hdrs; buildHead(hdrs, "products"); buildBody(products, hdrs, "products"); }
function renderFeatures(hdrs, features) { featHeaders = hdrs; buildHead(hdrs, "features"); buildBody(features, hdrs, "features"); }

function buildHead(hdrs, table) {
  const thead = document.getElementById(table === "products" ? "thead" : "fthead");
  thead.innerHTML = "";
  const tr = document.createElement("tr");
  hdrs.forEach((h, ci) => tr.appendChild(makeColHeader(h, ci, hdrs.length, table)));
  const thAdd = document.createElement("th");
  thAdd.className = "th-add";
  const addBtn = document.createElement("button");
  addBtn.className = "th-add-btn"; addBtn.title = "Add column"; addBtn.textContent = "+";
  addBtn.onclick = () => addColumn(table);
  thAdd.appendChild(addBtn); tr.appendChild(thAdd);
  const thDel = document.createElement("th"); thDel.className = "th-del"; tr.appendChild(thDel);
  thead.appendChild(tr);
}

function buildBody(rows, hdrs, table) {
  const tbody = document.getElementById(table === "products" ? "tbody" : "ftbody");
  tbody.innerHTML = "";
  rows.forEach((p, ri) => tbody.appendChild(makeDataRow(p, ri, hdrs, table)));
  const addTr = document.createElement("tr"); addTr.className = "add-row-tr";
  const addTd = document.createElement("td"); addTd.colSpan = hdrs.length + 2;
  const addBtn = document.createElement("button");
  addBtn.className = "add-row-btn";
  addBtn.textContent = table === "products" ? "+ Add product" : "+ Add feature";
  addBtn.onclick = () => addRow(table);
  addTd.appendChild(addBtn); addTr.appendChild(addTd); tbody.appendChild(addTr);
}

function makeColHeader(h, ci, total, table) {
  const th = document.createElement("th");

  const inner = document.createElement("div");
  inner.className = "th-inner";
  inner.style.cssText = "display:flex;align-items:center;gap:3px;";

  // Left arrow
  if (ci > 1) {
    const ml = document.createElement("button");
    ml.className = "col-btn"; ml.textContent = "â†"; ml.title = "Move left";
    ml.onclick = e => { e.stopPropagation(); moveColumn(ci, ci - 1, table); };
    inner.appendChild(ml);
  }

  const name = document.createElement("span");
  name.className = "th-name";
  name.contentEditable = "true";
  name.textContent = h;
  name.spellcheck = false;
  name.style.cssText = "flex:1;min-width:0;";
  name.onblur = () => {
    if (table === "products") { headers[ci] = name.textContent.trim() || h; scheduleSave(); }
    else { featHeaders[ci] = name.textContent.trim() || h; scheduleFeatSave(); }
  };
  name.onkeydown = e => { if (e.key === "Enter") { e.preventDefault(); name.blur(); } };
  inner.appendChild(name);

  // Right arrow
  if (ci > 0 && ci < total - 1) {
    const mr = document.createElement("button");
    mr.className = "col-btn"; mr.textContent = "â†’"; mr.title = "Move right";
    mr.onclick = e => { e.stopPropagation(); moveColumn(ci, ci + 1, table); };
    inner.appendChild(mr);
  }

  // Delete â€” 5px gap from right arrow
  if (ci > 0) {
    const dc = document.createElement("button");
    dc.className = "col-btn del"; dc.textContent = "âœ•"; dc.title = "Delete column";
    dc.style.marginLeft = "7px";
    dc.onclick = e => { e.stopPropagation(); deleteColumn(ci, table); };
    inner.appendChild(dc);
  }

  th.appendChild(inner);
  return th;
}

function moveColumn(from, to, table) {
  const hdrs = table === "products" ? headers : featHeaders;
  const rows = table === "products" ? getProductsFromDOM() : getFeaturesFromDOM();

  // Only swap header order â€” render uses header names as keys so data follows automatically
  [hdrs[from], hdrs[to]] = [hdrs[to], hdrs[from]];

  if (table === "products") { headers = hdrs; render(hdrs, rows); scheduleSave(); }
  else { featHeaders = hdrs; renderFeatures(hdrs, rows); scheduleFeatSave(); }
}

function makeDataRow(product, ri, hdrs, table) {
  const tr = document.createElement("tr");
  hdrs.forEach((h, ci) => {
    const td = document.createElement("td");
    const val = product[h] || "";
    if (ci === 0) { td.className = "name-cell"; td.textContent = val; }
    else {
      const n = parseFloat(val);
      td.className = (!val || val === "0" || n === 0) ? "zero" : "num-cell";
      td.textContent = val || "â€”";
    }
    td.contentEditable = "true";
    td.spellcheck = false;
    td.onfocus = () => { if (td.textContent === "â€”") td.textContent = ""; };
    td.onblur = () => {
      const v = td.textContent.trim();
      if (!v && ci !== 0) td.textContent = "â€”";
      if (ci > 0) { const n = parseFloat(v); td.className = (!v || v === "0" || n === 0) ? "zero" : "num-cell"; }
      if (table === "products") scheduleSave(); else scheduleFeatSave();
    };
    td.onkeydown = e => {
      if (e.key === "Enter") { e.preventDefault(); td.blur(); }
      if (e.key === "Tab") {
        e.preventDefault();
        const cells = [...tr.querySelectorAll("td[contenteditable]")];
        const idx = cells.indexOf(td);
        if (e.shiftKey && idx > 0) cells[idx-1].focus();
        else if (!e.shiftKey && idx < cells.length-1) cells[idx+1].focus();
      }
    };
    tr.appendChild(td);
  });
  const tdAdd = document.createElement("td"); tr.appendChild(tdAdd);
  const tdDel = document.createElement("td");
  tdDel.className = "td-del";
  const delBtn = document.createElement("button");
  delBtn.className = "del-row-btn"; delBtn.textContent = "âœ•"; delBtn.title = "Delete";
  delBtn.onclick = () => { tr.remove(); if (table === "products") scheduleSave(); else scheduleFeatSave(); };
  tdDel.appendChild(delBtn); tr.appendChild(tdDel);
  return tr;
}

function addColumn(table) {
  const name = prompt("Column name (e.g. 'Cord /meters'):");
  if (!name) return;
  if (table === "products") { headers.push(name); rebuildFromState(); scheduleSave(); }
  else { featHeaders.push(name); rebuildFeatFromState(); scheduleFeatSave(); }
}

function deleteColumn(ci, table) {
  const hdrs = table === "products" ? headers : featHeaders;
  if (!confirm(`Delete column "${hdrs[ci]}"?`)) return;
  hdrs.splice(ci, 1);
  if (table === "products") { rebuildFromState(); scheduleSave(); }
  else { rebuildFeatFromState(); scheduleFeatSave(); }
}

function moveCol(ci, dir, table) {
  const hdrs = table === "products" ? headers : featHeaders;
  const ni = ci + dir;
  if (ni < 0 || ni >= hdrs.length) return;
  [hdrs[ci], hdrs[ni]] = [hdrs[ni], hdrs[ci]];
  if (table === "products") { rebuildFromState(); scheduleSave(); }
  else { rebuildFeatFromState(); scheduleFeatSave(); }
}

function rebuildFromState() { render(headers, getProductsFromDOM()); }
function rebuildFeatFromState() { renderFeatures(featHeaders, getFeaturesFromDOM()); }

function getProductsFromDOM() {
  return [...document.getElementById("tbody").querySelectorAll("tr:not(.add-row-tr)")].map(tr => {
    const cells = [...tr.querySelectorAll("td[contenteditable]")];
    const obj = {};
    headers.forEach((h, i) => { let v = cells[i]?.textContent.trim() || ""; if (v === "â€”") v = ""; obj[h] = v; });
    return obj;
  });
}

function getFeaturesFromDOM() {
  return [...document.getElementById("ftbody").querySelectorAll("tr:not(.add-row-tr)")].map(tr => {
    const cells = [...tr.querySelectorAll("td[contenteditable]")];
    const obj = {};
    featHeaders.forEach((h, i) => { let v = cells[i]?.textContent.trim() || ""; if (v === "â€”") v = ""; obj[h] = v; });
    return obj;
  });
}

function addRow(table) {
  const tbodyId = table === "products" ? "tbody" : "ftbody";
  const hdrs = table === "products" ? headers : featHeaders;
  const tbody = document.getElementById(tbodyId);
  const addRowTr = tbody.querySelector(".add-row-tr");
  const empty = {}; hdrs.forEach(h => empty[h] = "");
  const ri = tbody.querySelectorAll("tr:not(.add-row-tr)").length;
  const tr = makeDataRow(empty, ri, hdrs, table);
  tbody.insertBefore(tr, addRowTr);
  tr.querySelector("td[contenteditable]")?.focus();
  if (table === "products") scheduleSave(); else scheduleFeatSave();
}

function scheduleSave() {
  clearTimeout(saveTimer);
  setStatus("Unsaved changesâ€¦");
  saveTimer = setTimeout(saveAll, 1500);
}

function scheduleFeatSave() {
  clearTimeout(featSaveTimer);
  setFeatStatus("Unsaved changesâ€¦");
  featSaveTimer = setTimeout(saveFeatAll, 1500);
}

async function saveAll() {
  clearTimeout(saveTimer);
  setStatus("Savingâ€¦", "loading");
  try {
    const res = await fetch(`${API}/products`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ products: getProductsFromDOM(), headers })
    });
    if (!res.ok) throw new Error();
    cacheInvalidate("products");
    setStatus("âœ“ Saved", "ok");
    clearStatus(2000);
  } catch(e) {
    setStatus("Save failed â€” check connection", "error");
  }
}

async function saveFeatAll() {
  clearTimeout(featSaveTimer);
  setFeatStatus("Savingâ€¦", "loading");
  try {
    const res = await fetch(`${API}/features`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ products: getFeaturesFromDOM(), headers: featHeaders })
    });
    if (!res.ok) throw new Error();
    cacheInvalidate("features");
    setFeatStatus("âœ“ Saved", "ok");
    clearFeatStatus(2000);
  } catch(e) {
    setFeatStatus("Save failed â€” check connection", "error");
  }
}

function handleLogin() { alert("Google login coming soon"); }

loadProducts();
loadFeatures();
</script>
</body>
</html>
