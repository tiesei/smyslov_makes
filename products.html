<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🧵</text></svg>">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>🧵 things calculator</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap');

  :root {
    --bg: #f0ede8;
    --surface: #faf9f7;
    --border: #ddd9d3;
    --text: #1a1a18;
    --text-muted: #888880;
    --accent: #2d5a3d;
    --mono: 'DM Mono', monospace;
    --sans: 'DM Sans', sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { max-width: 100vw; overflow-x: hidden; }
  body { font-family: var(--sans); background: var(--bg); color: var(--text); min-height: 100vh; }

  nav {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0 0.75rem;
    display: flex;
    align-items: center;
    gap: 0.5rem;
    height: 60px;
    position: sticky;
    top: 0;
    z-index: 9999;
    width: 100%;
    max-width: 100vw;
    box-sizing: border-box;
  }

  .nav-brand {
    display: flex; flex-direction: column; align-items: flex-start;
    text-decoration: none; gap: 0; line-height: 1; flex-shrink: 0;
    padding: 2px 0;
  }
  .nav-brand img {
    width: 50px; height: auto; display: block;
  }
  .nav-brand-sub {
    font-family: var(--mono); font-size: 11px; font-weight: 500;
    color: var(--text-muted); letter-spacing: 0.08em;
    text-transform: lowercase; line-height: 1; margin-top: 2px;
    width: 50px; text-align: center;
  }

  .nav-links { display: flex; flex-shrink: 1; min-width: 0; }
  .nav-links a { font-size: 13px; color: var(--text-muted); text-decoration: none; padding: 0 0.6rem; height: 60px; display: flex; align-items: center; border-bottom: 2px solid transparent; transition: color 0.15s, border-color 0.15s; white-space: nowrap; }
  .nav-links a:hover { color: var(--text); }
  .nav-links a.active { color: var(--text); border-bottom-color: var(--accent); }
  .nav-end { margin-left: auto; flex-shrink: 0; }
  .btn-ghost { font-size: 12px; padding: 3px 10px; background: none; border: 1px solid var(--border); border-radius: 5px; cursor: pointer; color: var(--text-muted); font-family: var(--sans); }

  .toolbar { display: flex; align-items: center; gap: 0.5rem; padding: 0.6rem 1rem; }
  .page-title { font-size: 12px; color: var(--text-muted); font-family: var(--mono); margin-right: auto; }

  .btn { font-family: var(--sans); font-size: 12px; font-weight: 500; padding: 4px 10px; border-radius: 5px; border: 1px solid var(--border); cursor: pointer; background: var(--surface); color: var(--text-muted); transition: all 0.15s; white-space: nowrap; }
  .btn:hover { background: var(--bg); color: var(--text); }
  .btn-primary { background: var(--accent); color: #fff; border-color: var(--accent); }
  .btn-primary:hover { opacity: 0.88; color: #fff; background: var(--accent); }

  .status-bar { font-family: var(--mono); font-size: 11px; color: var(--text-muted); padding: 0 1rem 0.35rem; display: flex; align-items: center; gap: 0.4rem; min-height: 18px; }
  .status-bar.loading { color: var(--accent); }
  .status-bar.error { color: #8b3a2a; }
  .status-bar.ok { color: var(--accent); }
  .spinner { width: 10px; height: 10px; border: 1.5px solid currentColor; border-top-color: transparent; border-radius: 50%; animation: spin 0.7s linear infinite; display: inline-block; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .table-wrap {
    background: var(--surface);
    border-top: 1px solid var(--border);
    border-bottom: 1px solid var(--border);
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
    width: 100%;
  }

  body { overflow-x: hidden; }

  table { width: auto; min-width: 100%; border-collapse: collapse; table-layout: auto; }
  thead { background: var(--bg); }

  th {
    font-family: var(--mono);
    font-size: 10px;
    font-weight: 500;
    color: var(--text-muted);
    letter-spacing: 0.05em;
    text-transform: uppercase;
    border-bottom: 1px solid var(--border);
    white-space: nowrap;
    position: relative;
    width: 1%;
  }

  .th-inner {
    display: grid;
    grid-template-columns: auto 1fr auto;
    align-items: center;
    gap: 2px;
    padding: 3px 6px;
  }

  .th-left { display: flex; gap: 1px; align-items: center; opacity: 0; transition: opacity 0.15s; flex-shrink: 0; }
  .th-right { display: flex; gap: 1px; align-items: center; opacity: 0; transition: opacity 0.15s; flex-shrink: 0; justify-content: flex-end; }
  th:hover .th-left, th:hover .th-right { opacity: 1; }

  .th-name { outline: none; cursor: text; white-space: nowrap; text-align: center; }
  th:first-child .th-name { text-align: left; }
  th:not(:first-child) .th-name { text-align: right; }
  .th-name:focus { color: var(--text); }

  .col-btn { font-size: 10px; background: none; border: none; cursor: pointer; color: var(--text-muted); padding: 1px 3px; border-radius: 2px; line-height: 1; transition: color 0.1s, background 0.1s; }
  .col-btn:hover { color: var(--text); background: var(--border); }
  .col-btn.del:hover { color: #8b3a2a; }

  th.th-add { width: 28px; padding: 0; }
  .th-add-btn { width: 100%; background: none; border: none; cursor: pointer; color: var(--text-muted); font-size: 15px; padding: 4px 6px; display: flex; align-items: center; justify-content: center; transition: color 0.15s; }
  .th-add-btn:hover { color: var(--accent); }
  th.th-del { width: 24px; }

  td { padding: 2px 8px; border-bottom: 1px solid var(--border); vertical-align: middle; font-size: 13px; outline: none; white-space: nowrap; width: 1%; line-height: 1.6; }
  td:focus { background: #fff !important; box-shadow: inset 0 0 0 1px var(--accent); border-radius: 2px; white-space: normal; }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: #f5f3ef; }
  tr.add-row-tr:hover td { background: transparent; }

  td.name-cell { font-weight: 500; white-space: nowrap; }
  td.num-cell { font-family: var(--mono); font-size: 12px; text-align: right; }
  td.zero { font-family: var(--mono); font-size: 12px; text-align: right; color: var(--text-muted); }

  .del-row-btn { background: none; border: none; cursor: pointer; color: var(--text-muted); font-size: 12px; padding: 2px 4px; opacity: 0; transition: opacity 0.15s, color 0.15s; border-radius: 3px; }
  tr:hover .del-row-btn { opacity: 1; }
  .del-row-btn:hover { color: #8b3a2a; }

  .add-row-btn { background: none; border: none; cursor: pointer; color: var(--text-muted); font-size: 12px; font-family: var(--sans); padding: 6px 0; display: flex; align-items: center; gap: 4px; transition: color 0.15s; }
  .add-row-btn:hover { color: var(--accent); }

  
  
    6%   { opacity: 0; transform: translate(0,0); }
    10%  { opacity: 0; }
    11%  { opacity: 1; transform: translate(3px, -1px); }
    12%  { opacity: 0.3; transform: translate(-1px, 0); }
    13%  { opacity: 1; transform: translate(0,0); }
    30%  { opacity: 1; transform: translate(0,0); }
    31%  { opacity: 0.2; transform: translate(2px, 0); }
    32%  { opacity: 1; transform: translate(0,0); }
    55%  { opacity: 1; transform: translate(0,0); }
    56%  { opacity: 0; }
    57%  { opacity: 1; transform: translate(-1px, 1px); }
    58%  { opacity: 1; transform: translate(0,0); }
    100% { opacity: 1; transform: translate(0,0); }
  }

  
</style>
</head>
<body>

</div>
</div>

<nav>
  <a href="index.html" class="nav-brand">
    <img src="logo.png" alt="smysl makes">
    <span class="nav-brand-sub">makes</span>
  </a>
  <div class="nav-links">
    <a href="index.html">Materials</a>
    <a href="products.html" class="active">Products</a>
    <a href="calculator.html">Calculator</a>
  </div>
  <div class="nav-end">
    <button class="btn-ghost" onclick="handleLogin()" style="white-space:nowrap;flex-shrink:0;font-size:11px;padding:3px 7px;">sign in</button>
  </div>
</nav>

<div class="toolbar">
  <span class="page-title">products</span>
</div>

<div class="status-bar" id="statusBar"></div>

<div class="table-wrap">
  <table>
    <thead id="thead"></thead>
    <tbody id="tbody"></tbody>
  </table>
</div>

<script>


const API = "https://materials-parser-api.onrender.com";
let headers = [];
let saveTimer = null;

function setStatus(msg, type = "") {
  const b = document.getElementById("statusBar");
  b.className = "status-bar" + (type ? " " + type : "");
  b.innerHTML = type === "loading" ? `<span class="spinner"></span> ${msg}` : msg;
}
function clearStatus(d = 0) { setTimeout(() => { const b = document.getElementById("statusBar"); b.innerHTML = ""; b.className = "status-bar"; }, d); }

async function loadProducts() {
  setStatus("Loading…", "loading");
  try {
    const res = await fetch(`${API}/products`);
    const data = await res.json();
    headers = data.headers.length ? data.headers : ["Product Name"];
    render(headers, data.products || []);
    clearStatus();
  } catch(e) {
    setStatus("Failed to load — API may be waking up, try again in 30s.", "error");
  }
}

function render(hdrs, products) {
  headers = hdrs;
  buildHead(hdrs);
  buildBody(products, hdrs);
}

function buildHead(hdrs) {
  const thead = document.getElementById("thead");
  thead.innerHTML = "";
  const tr = document.createElement("tr");

  hdrs.forEach((h, ci) => tr.appendChild(makeColHeader(h, ci, hdrs.length)));

  const thAdd = document.createElement("th");
  thAdd.className = "th-add";
  const addBtn = document.createElement("button");
  addBtn.className = "th-add-btn";
  addBtn.title = "Add column";
  addBtn.textContent = "+";
  addBtn.onclick = addColumn;
  thAdd.appendChild(addBtn);
  tr.appendChild(thAdd);

  const thDel = document.createElement("th");
  thDel.className = "th-del";
  tr.appendChild(thDel);

  thead.appendChild(tr);
}

function makeColHeader(h, ci, total) {
  const th = document.createElement("th");
  const inner = document.createElement("div");
  inner.className = "th-inner";

  const left = document.createElement("div");
  left.className = "th-left";
  if (ci > 0) {
    const ml = document.createElement("button");
    ml.className = "col-btn"; ml.textContent = "←"; ml.title = "Move left";
    ml.onclick = e => { e.stopPropagation(); moveCol(ci, -1); };
    left.appendChild(ml);
  }
  if (ci < total - 1) {
    const mr = document.createElement("button");
    mr.className = "col-btn"; mr.textContent = "→"; mr.title = "Move right";
    mr.onclick = e => { e.stopPropagation(); moveCol(ci, 1); };
    left.appendChild(mr);
  }

  const name = document.createElement("span");
  name.className = "th-name";
  name.contentEditable = "true";
  name.textContent = h;
  name.spellcheck = false;
  name.onblur = () => { headers[ci] = name.textContent.trim() || h; scheduleSave(); };
  name.onkeydown = e => { if (e.key === "Enter") { e.preventDefault(); name.blur(); } };

  const right = document.createElement("div");
  right.className = "th-right";
  if (ci > 0) {
    const dc = document.createElement("button");
    dc.className = "col-btn del"; dc.textContent = "✕"; dc.title = "Delete column";
    dc.onclick = e => { e.stopPropagation(); deleteColumn(ci); };
    right.appendChild(dc);
  }

  inner.appendChild(left);
  inner.appendChild(name);
  inner.appendChild(right);
  th.appendChild(inner);
  return th;
}

function buildBody(products, hdrs) {
  const tbody = document.getElementById("tbody");
  tbody.innerHTML = "";
  products.forEach((p, ri) => tbody.appendChild(makeDataRow(p, ri, hdrs)));

  const addTr = document.createElement("tr");
  addTr.className = "add-row-tr";
  const addTd = document.createElement("td");
  addTd.colSpan = hdrs.length + 2;
  const addBtn = document.createElement("button");
  addBtn.className = "add-row-btn";
  addBtn.textContent = "+ Add product";
  addBtn.onclick = addRow;
  addTd.appendChild(addBtn);
  addTr.appendChild(addTd);
  tbody.appendChild(addTr);
}

function makeDataRow(product, ri, hdrs) {
  const tr = document.createElement("tr");

  hdrs.forEach((h, ci) => {
    const td = document.createElement("td");
    const val = product[h] || "";
    if (ci === 0) { td.className = "name-cell"; td.textContent = val; }
    else {
      const n = parseFloat(val);
      td.className = (!val || val === "0" || n === 0) ? "zero" : "num-cell";
      td.textContent = val || "—";
    }
    td.contentEditable = "true";
    td.spellcheck = false;
    td.onfocus = () => { if (td.textContent === "—") td.textContent = ""; };
    td.onblur = () => {
      const v = td.textContent.trim();
      if (!v && ci !== 0) td.textContent = "—";
      if (ci > 0) { const n = parseFloat(v); td.className = (!v || v === "0" || n === 0) ? "zero" : "num-cell"; }
      scheduleSave();
    };
    td.onkeydown = e => {
      if (e.key === "Enter") { e.preventDefault(); td.blur(); }
      if (e.key === "Tab") {
        e.preventDefault();
        const cells = [...tr.querySelectorAll("td[contenteditable]")];
        const idx = cells.indexOf(td);
        if (e.shiftKey && idx > 0) cells[idx-1].focus();
        else if (!e.shiftKey && idx < cells.length-1) cells[idx+1].focus();
      }
    };
    tr.appendChild(td);
  });

  const tdAdd = document.createElement("td"); tr.appendChild(tdAdd);

  const tdDel = document.createElement("td");
  const delBtn = document.createElement("button");
  delBtn.className = "del-row-btn"; delBtn.textContent = "✕"; delBtn.title = "Delete";
  delBtn.onclick = () => { tr.remove(); scheduleSave(); };
  tdDel.appendChild(delBtn);
  tr.appendChild(tdDel);

  return tr;
}

function addColumn() {
  const name = prompt("Column name (e.g. 'Cord /meters'):");
  if (!name) return;
  headers.push(name);
  rebuildFromState();
  scheduleSave();
}

function deleteColumn(ci) {
  if (!confirm(`Delete column "${headers[ci]}"?`)) return;
  headers.splice(ci, 1);
  rebuildFromState();
  scheduleSave();
}

function moveCol(ci, dir) {
  const ni = ci + dir;
  if (ni < 0 || ni >= headers.length) return;
  [headers[ci], headers[ni]] = [headers[ni], headers[ci]];
  rebuildFromState();
  scheduleSave();
}

function rebuildFromState() { render(headers, getProductsFromDOM()); }

function getProductsFromDOM() {
  const tbody = document.getElementById("tbody");
  return [...tbody.querySelectorAll("tr:not(.add-row-tr)")].map(tr => {
    const cells = [...tr.querySelectorAll("td[contenteditable]")];
    const obj = {};
    headers.forEach((h, i) => {
      let v = cells[i]?.textContent.trim() || "";
      if (v === "—") v = "";
      obj[h] = v;
    });
    return obj;
  });
}

function addRow() {
  const tbody = document.getElementById("tbody");
  const addRowTr = tbody.querySelector(".add-row-tr");
  const empty = {}; headers.forEach(h => empty[h] = "");
  const ri = tbody.querySelectorAll("tr:not(.add-row-tr)").length;
  const tr = makeDataRow(empty, ri, headers);
  tbody.insertBefore(tr, addRowTr);
  tr.querySelector("td[contenteditable]")?.focus();
  scheduleSave();
}

function scheduleSave() {
  clearTimeout(saveTimer);
  setStatus("Unsaved changes…");
  saveTimer = setTimeout(saveAll, 1500);
}

async function saveAll() {
  clearTimeout(saveTimer);
  setStatus("Saving…", "loading");
  try {
    const res = await fetch(`${API}/products`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ products: getProductsFromDOM(), headers })
    });
    if (!res.ok) throw new Error();
    setStatus("✓ Saved", "ok");
    clearStatus(2000);
  } catch(e) {
    setStatus("Save failed — check connection", "error");
  }
}

function handleLogin() { alert("Google login coming soon"); }

loadProducts();
</script>
</body>
</html>
